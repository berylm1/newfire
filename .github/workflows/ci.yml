name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff
          for f in $(find tenants -name requirements.txt); do
            echo "installing $f"
            pip install -r "$f"
          done

      - name: Lint
        run: ruff check .

      - name: Test
        run: |
          set +e
          python -m pytest
          code=$?
          set -e
          if [ "$code" -eq 5 ]; then
            echo "no tests collected yet, skipping"
            exit 0
          fi
          exit $code

  security-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install security test dependencies
        working-directory: ./server-config
        run: npm ci --omit=dev --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Install Jest for security tests
        run: npm install jest@29 --save-dev --prefix server-config --no-audit --no-fund

      - name: Run security tests
        run: npm test --prefix server-config
