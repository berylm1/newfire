name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff fastapi pydantic httpx
          for f in $(find tenants -name requirements.txt); do
            echo "installing $f"
            pip install -r "$f" || true
          done

      - name: Test
        run: |
          set +e
          python -m pytest --ignore=tests/benchmarks/
          code=$?
          set -e
          if [ "$code" -eq 5 ]; then
            echo "no tests collected yet, skipping"
            exit 0
          fi
          exit $code

  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff fastapi pydantic httpx qdrant-client langchain-openai langgraph locust

      - name: Run benchmarks
        run: |
          python -m pytest tests/benchmarks/ -v --tb=short || echo "Benchmarks completed with warnings"
