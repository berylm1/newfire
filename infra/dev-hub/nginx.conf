server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # No directory listing, no server header leakage
    server_tokens off;
    autoindex off;

    # Cache the landing page briefly so updates roll out fast
    location = / {
        add_header Cache-Control "public, max-age=60";
        try_files /index.html =404;
    }

    # Health check
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Anything else 404s. Hub is single-page only.
    location / {
        try_files $uri =404;
    }
}
