; llama.cpp router-mode model registry for NewFire homelab test.
; Loaded by: llama-server --models-preset /opt/llamacpp-router/models.ini --port 9094
;
; HOW THIS WORKS
;   Each [section] becomes a model id you can name in OpenAI-style requests.
;   The router translates each key=value below into a `--key value` CLI flag
;   passed to a llama-server child process per model.
;   GGUF files are downloaded from Hugging Face on first load and cached
;   under ~/.cache/llama.cpp; subsequent loads are local.

[gemma3-4b]
; Fast small chat model. ~3 GB VRAM. Loads in ~2-3 seconds after first download.
hf-repo  = ggml-org/gemma-3-4b-it-GGUF:Q4_K_M
ctx-size = 8192
n-gpu-layers = 99
threads  = 8

[qwen-coder-7b]
; Coding model for delegation. ~5 GB VRAM.
hf-repo  = Qwen/Qwen2.5-Coder-7B-Instruct-GGUF:Q5_K_M
ctx-size = 16384
n-gpu-layers = 99
threads  = 8

[deepseek-r1-8b]
; Reasoning model. ~5 GB VRAM.
hf-repo  = unsloth/DeepSeek-R1-Distill-Llama-8B-GGUF:Q5_K_M
ctx-size = 8192
n-gpu-layers = 99
threads  = 8

[qwen3-coder-30b]
; Full-size coder, MoE 30B-A3B (active 3B per token). Q4_K_M ~17 GB on disk.
; Note: vLLM also runs qwen3-coder-30b in NVFP4 on port 8000; this is the GGUF
; variant available through the router for agentic flows that prefer llama.cpp.
; Context kept modest (32k) to leave headroom alongside vLLM and the smaller
; router models. Bump to 65536 only if vLLM is paused.
hf-repo  = unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF:Q4_K_M
ctx-size = 32768
n-gpu-layers = 99
threads  = 16
