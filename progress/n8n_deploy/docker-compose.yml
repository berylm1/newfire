name: n8n-${CLIENT}

services:
  n8n:
    image: n8nio/n8n:1.77.0
    container_name: n8n-${CLIENT}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${N8N_PORT}:5678"
    environment:
      N8N_HOST: ${CLIENT}.newfire.ai
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      N8N_SECURE_COOKIE: "true"
      WEBHOOK_URL: https://${CLIENT}.newfire.ai/
      GENERIC_TIMEZONE: America/New_York
      TZ: America/New_York

      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_USER_MANAGEMENT_DISABLED: "false"
      N8N_BASIC_AUTH_ACTIVE: "false"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      N8N_TEMPLATES_ENABLED: "true"
      N8N_PERSONALIZATION_ENABLED: "false"

      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: ${DB_HOST}
      DB_POSTGRESDB_PORT: ${DB_PORT}
      DB_POSTGRESDB_DATABASE: n8n_${CLIENT}
      DB_POSTGRESDB_USER: n8n_${CLIENT}
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD}
      DB_POSTGRESDB_SCHEMA: public

      N8N_LOG_LEVEL: info
      N8N_LOG_OUTPUT: console
      EXECUTIONS_MODE: regular
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 336
      EXECUTIONS_DATA_PRUNE_MAX_COUNT: 10000
    volumes:
      - n8n_data:/home/node/.n8n
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - n8n_net
      - apisix_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:5678/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  n8n_data:
    name: n8n_${CLIENT}_data

networks:
  n8n_net:
    name: n8n_${CLIENT}_net
    driver: bridge
  apisix_net:
    name: apisix-quickstart-net
    external: true
