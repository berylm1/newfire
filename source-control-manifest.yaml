# Source-Control Manifest for NewFire Platform
# This file documents all services in the NewFire platform with their
# source control status. Used by the audit script to enforce GitHub governance.
#
# Fields:
#   - service: Service name
#   - local_path: Local filesystem path (on Mac developer machine)
#   - repo_url: GitHub repository URL (null if not configured)
#   - owner: Repository owner/organization
#   - deployment_host: Where the service is deployed (null if not deployed)
#   - deployment_path: Path on deployment host (null if not deployed)
#   - risk_level: "production" or "development"
#   - github_governed: Whether the service has a valid GitHub remote
#   - notes: Additional context
#
# Risk levels:
#   - production: Load-bearing service, requires GitHub governance
#   - development: In development, GitHub governance optional but recommended
#
# GitHub governance status:
#   - A service is "governed" if repo_url is non-null and the remote is accessible

