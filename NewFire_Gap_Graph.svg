<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .title { font-size: 30px; font-weight: 700; fill: #f5f5f0; }
      .subtitle { font-size: 15px; fill: #b8b8b8; }
      .node-title { font-size: 17px; font-weight: 700; fill: #fff; }
      .node-status { font-size: 11px; fill: #fff; font-style: italic; }
      .node-item { font-size: 11px; fill: #fff; }
      .edge-label { font-size: 11px; fill: #d0d0d0; font-style: italic; }
      .legend-text { font-size: 13px; fill: #f5f5f0; }
      .priority-badge { font-size: 14px; font-weight: 700; fill: #fff; }
      .footer { font-size: 12px; fill: #888; font-style: italic; }
    </style>

    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a9d5f"/>
    </marker>
    <marker id="arrow-gold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d4a017"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e63946"/>
    </marker>

    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#2a2a4a"/>
      <stop offset="100%" stop-color="#0f0f1e"/>
    </radialGradient>

    <radialGradient id="node-done" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#6bc77f"/>
      <stop offset="100%" stop-color="#2f6b3f"/>
    </radialGradient>
    <radialGradient id="node-partial" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#e5b92e"/>
      <stop offset="100%" stop-color="#8b6508"/>
    </radialGradient>
    <radialGradient id="node-gap" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ff5a6a"/>
      <stop offset="100%" stop-color="#8b1020"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg-grad)"/>

  <text x="800" y="48" text-anchor="middle" class="title">NewFire Homelab: 8-Layer Dependency Graph</text>
  <text x="800" y="74" text-anchor="middle" class="subtitle">Nodes sized by criticality. Edges show how each layer feeds the next. Red = gap, Gold = partial, Green = done.</text>

  <g stroke-width="2" fill="none" opacity="0.85">

    <path d="M 800,180 Q 800,350 800,520" stroke="#d4a017" marker-end="url(#arrow-gold)"/>
    <text x="820" y="360" class="edge-label">drives use cases</text>

    <path d="M 730,600 Q 540,490 400,400" stroke="#4a9d5f" marker-end="url(#arrow-green)"/>
    <text x="470" y="495" class="edge-label">needs brains</text>

    <path d="M 870,600 Q 1060,490 1200,400" stroke="#e63946" marker-end="url(#arrow-red)"/>
    <text x="1010" y="475" class="edge-label">needs knowledge (RAG)</text>

    <path d="M 740,640 Q 540,680 340,680" stroke="#d4a017" marker-end="url(#arrow-gold)"/>
    <text x="450" y="700" class="edge-label">needs memory + guardrails</text>

    <path d="M 860,640 Q 1060,680 1260,680" stroke="#e63946" marker-end="url(#arrow-red)"/>
    <text x="990" y="700" class="edge-label">clients build workflows here</text>

    <path d="M 800,680 Q 800,820 800,940" stroke="#d4a017" marker-end="url(#arrow-gold)"/>
    <text x="820" y="820" class="edge-label">reaches outside via API</text>

    <path d="M 1200,430 Q 800,520 340,650" stroke="#e63946" stroke-dasharray="5,4"/>
    <text x="700" y="580" class="edge-label">RAG feeds memory</text>

    <path d="M 400,430 Q 340,540 320,620" stroke="#4a9d5f" stroke-dasharray="5,4"/>

    <path d="M 720,970 Q 550,1010 400,1020" stroke="#4a9d5f" stroke-dasharray="3,3"/>

    <path d="M 900,960 Q 900,600 900,200" stroke="#d4a017" stroke-dasharray="2,5" opacity="0.5"/>
    <text x="910" y="400" class="edge-label" opacity="0.7">webhooks bring world in</text>

  </g>

  <g>
    <circle cx="800" cy="140" r="80" fill="url(#node-partial)" stroke="#fff" stroke-width="3"/>
    <text x="800" y="120" text-anchor="middle" class="node-title">8. Business</text>
    <text x="800" y="138" text-anchor="middle" class="node-title">Layer</text>
    <text x="800" y="158" text-anchor="middle" class="node-status">partial</text>
    <text x="800" y="176" text-anchor="middle" class="node-item">ROI + avatars missing</text>
  </g>

  <g>
    <circle cx="800" cy="600" r="100" fill="url(#node-partial)" stroke="#fff" stroke-width="4"/>
    <text x="800" y="578" text-anchor="middle" class="node-title">6. Agents +</text>
    <text x="800" y="598" text-anchor="middle" class="node-title">Automation</text>
    <text x="800" y="620" text-anchor="middle" class="node-status">central hub</text>
    <text x="800" y="640" text-anchor="middle" class="node-item">HITL missing</text>
  </g>

  <g>
    <circle cx="350" cy="370" r="80" fill="url(#node-done)" stroke="#fff" stroke-width="3"/>
    <text x="350" y="350" text-anchor="middle" class="node-title">4. Models +</text>
    <text x="350" y="370" text-anchor="middle" class="node-title">Providers</text>
    <text x="350" y="390" text-anchor="middle" class="node-status">done</text>
    <text x="350" y="408" text-anchor="middle" class="node-item">Ollama + OpenRouter</text>
  </g>

  <g>
    <circle cx="1250" cy="370" r="90" fill="url(#node-gap)" stroke="#fff" stroke-width="4"/>
    <text x="1250" y="345" text-anchor="middle" class="node-title">2. Data</text>
    <text x="1250" y="368" text-anchor="middle" class="node-status">BIGGEST GAP</text>
    <text x="1250" y="388" text-anchor="middle" class="node-item">No Vector DB</text>
    <text x="1250" y="404" text-anchor="middle" class="node-item">No RAG</text>
  </g>

  <g>
    <circle cx="270" cy="680" r="80" fill="url(#node-partial)" stroke="#fff" stroke-width="3"/>
    <text x="270" y="660" text-anchor="middle" class="node-title">3. Intelligence</text>
    <text x="270" y="680" text-anchor="middle" class="node-title">Layer</text>
    <text x="270" y="700" text-anchor="middle" class="node-status">partial</text>
    <text x="270" y="718" text-anchor="middle" class="node-item">Memory missing</text>
  </g>

  <g>
    <circle cx="1330" cy="680" r="90" fill="url(#node-gap)" stroke="#fff" stroke-width="4"/>
    <text x="1330" y="655" text-anchor="middle" class="node-title">7. No-Code</text>
    <text x="1330" y="675" text-anchor="middle" class="node-title">Builder</text>
    <text x="1330" y="696" text-anchor="middle" class="node-status">2nd BIG GAP</text>
    <text x="1330" y="714" text-anchor="middle" class="node-item">No n8n / Flowwise</text>
  </g>

  <g>
    <circle cx="800" cy="990" r="80" fill="url(#node-partial)" stroke="#fff" stroke-width="3"/>
    <text x="800" y="970" text-anchor="middle" class="node-title">5. Infra +</text>
    <text x="800" y="990" text-anchor="middle" class="node-title">Connectivity</text>
    <text x="800" y="1010" text-anchor="middle" class="node-status">partial</text>
    <text x="800" y="1028" text-anchor="middle" class="node-item">Webhooks, MCP gap</text>
  </g>

  <g>
    <circle cx="300" cy="1020" r="70" fill="url(#node-done)" stroke="#fff" stroke-width="3"/>
    <text x="300" y="1005" text-anchor="middle" class="node-title">1. Fundamentals</text>
    <text x="300" y="1028" text-anchor="middle" class="node-status">foundation</text>
    <text x="300" y="1048" text-anchor="middle" class="node-item">Tokens, prompts, ctx</text>
  </g>

  <g transform="translate(1170, 1000)">
    <rect x="0" y="0" width="400" height="180" rx="8" fill="#1a1a2e" stroke="#555" stroke-width="1" opacity="0.92"/>
    <text x="20" y="28" class="node-title">Legend</text>

    <circle cx="35" cy="58" r="10" fill="url(#node-done)"/>
    <text x="55" y="62" class="legend-text">Done (green fill)</text>

    <circle cx="35" cy="88" r="10" fill="url(#node-partial)"/>
    <text x="55" y="92" class="legend-text">Partial / planned (gold fill)</text>

    <circle cx="35" cy="118" r="10" fill="url(#node-gap)"/>
    <text x="55" y="122" class="legend-text">Gap (red fill, thicker ring)</text>

    <line x1="200" y1="58" x2="240" y2="58" stroke="#4a9d5f" stroke-width="2"/>
    <text x="248" y="62" class="legend-text">solid = active flow</text>

    <line x1="200" y1="88" x2="240" y2="88" stroke="#d4a017" stroke-width="2" stroke-dasharray="5,4"/>
    <text x="248" y="92" class="legend-text">dashed = supporting</text>

    <line x1="200" y1="118" x2="240" y2="118" stroke="#e63946" stroke-width="2"/>
    <text x="248" y="122" class="legend-text">red edge = critical gap</text>

    <text x="20" y="158" class="footer">Bigger node = more critical to value prop</text>
  </g>

  <g transform="translate(40, 1100)">
    <text x="0" y="0" class="subtitle">Read it as a flow:</text>
    <text x="0" y="22" class="legend-text">Business Layer sets the use case, so Agents orchestrate the work, and they pull from Models (done),</text>
    <text x="0" y="42" class="legend-text">Data (missing RAG), and Intelligence (missing memory), while No-Code lets clients self-serve, and Infra exposes it all.</text>
  </g>

</svg>
