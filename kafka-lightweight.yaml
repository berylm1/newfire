apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: data-cluster
  namespace: data-infrastructure
spec:
  kafka:
    version: 3.6.0
    replicas: 1  # Single broker for resource efficiency
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      log.retention.hours: 24
      auto.create.topics.enable: false
    storage:
      type: persistent-claim
      size: 10Gi
      class: fast-ssd
      deleteClaim: false
    resources:
      requests:
        memory: 512Mi
        cpu: "250m"
      limits:
        memory: 1Gi
        cpu: "500m"
  zookeeper:
    replicas: 1  # Single ZK node
    storage:
      type: persistent-claim
      size: 5Gi
      class: fast-ssd
      deleteClaim: false
    resources:
      requests:
        memory: 256Mi
        cpu: "200m"
      limits:
        memory: 512Mi
        cpu: "400m"
  entityOperator:
    topicOperator: {}
    userOperator: {}
